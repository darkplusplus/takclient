name: release

on:
  push:
    tags:
      - v*

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: |
          6.0.x
          8.0.x
          10.0.x

    - name: Restore dependencies
      run: dotnet restore

    - name: Verify tag matches package version
      shell: bash
      run: |
        PACKAGE_VERSION="$(grep -oPm1 '(?<=<Version>)[^<]+' dpp.takclient/dpp.takclient.csproj)"
        TAG_VERSION="${GITHUB_REF_NAME#v}"
        if [[ "$PACKAGE_VERSION" != "$TAG_VERSION" ]]; then
          echo "Tag version '$TAG_VERSION' does not match package version '$PACKAGE_VERSION'."
          exit 1
        fi

    - name: Build
      run: dotnet build takclient.sln -c Release --no-restore -m:1

    - name: Test
      run: dotnet test takclient.sln -c Release --no-build --verbosity normal -m:1

    - name: Pack
      run: dotnet pack dpp.takclient/dpp.takclient.csproj -c Release --no-build

    - name: Upload Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: dpp.takclient
        path: dpp.takclient/bin/Release/*.nupkg

    - name: Publish To Nuget
      run: dotnet nuget push dpp.takclient/bin/Release/*.nupkg -k $NUGET_AUTH_TOKEN -s https://api.nuget.org/v3/index.json
      env:
        NUGET_AUTH_TOKEN: ${{ secrets.NUGET_SECRET_DPP_TAKCLIENT }}
